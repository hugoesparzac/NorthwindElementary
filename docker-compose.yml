services:
  database:
    image: postgres:17.2
    container_name: northwind-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_dev_password
      - POSTGRES_DB=NorthwindElementary
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d NorthwindElementary"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: src/Northwind.Api/Dockerfile
    container_name: northwind-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=database;Database=NorthwindElementary;Username=postgres;Password=postgres_dev_password
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: src/Northwind.Client/Dockerfile
    container_name: northwind-web
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres-data:
